name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  self-scan:
    name: Self-scan (dogfooding)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Scan own source code
        run: |
          node dist/cli.js scan ./src --fail-on=high --output=sarif > leak-guard.sarif || true
        continue-on-error: true
      - name: Ensure SARIF file exists
        if: always()
        run: |
          if [ ! -s leak-guard.sarif ]; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"nestjs-leak-guard","version":"0.0.1","rules":[]}},"results":[]}]}' > leak-guard.sarif
          fi
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: leak-guard.sarif
